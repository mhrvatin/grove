# CI for grove.
# Runs on every PR to main and every push to main.
# Docs-only PRs skip the build/test jobs.
# Branch protection should use `ci-ok` as the sole required status check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          if ! echo "$CHANGED" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
          fi

  committer-check:
    name: Committer identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Verify committer name and email on every commit
        env:
          EXPECTED_NAME: Marcus Hrvatin
          EXPECTED_EMAIL: github.com@hrvatin.se
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: check every commit introduced by the branch, merges included.
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            MAPFILE=$(git log --format='%H%x09%cn%x09%ce' "$BASE..$HEAD")
          else
            # Push to main: skip merge commits. Assumes the "Create a merge
            # commit" strategy — GitHub's merge commit itself is by 'GitHub
            # <noreply@github.com>' and would otherwise always fail. Squash or
            # rebase strategies would emit non-merge commits by GitHub that
            # this filter does NOT skip — switching strategy will require
            # revisiting this check.
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            ZERO="0000000000000000000000000000000000000000"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ]; then
              MAPFILE=$(git log -1 --no-merges --format='%H%x09%cn%x09%ce' "$AFTER")
            else
              MAPFILE=$(git log --no-merges --format='%H%x09%cn%x09%ce' "$BEFORE..$AFTER")
            fi
          fi

          FAIL=0
          while IFS=$'\t' read -r SHA NAME EMAIL; do
            [ -z "$SHA" ] && continue
            if [ "$NAME" != "$EXPECTED_NAME" ] || [ "$EMAIL" != "$EXPECTED_EMAIL" ]; then
              echo "::error::Commit $SHA has committer '$NAME <$EMAIL>' — expected '$EXPECTED_NAME <$EXPECTED_EMAIL>'"
              FAIL=1
            fi
          done <<< "$MAPFILE"

          exit $FAIL

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run check

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun test

  ci-ok:
    name: CI OK
    if: always()
    needs: [changes, committer-check, lint, build, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.committer-check.result }}" != "success" ]; then
            echo "Committer identity check failed."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "Docs-only change — CI jobs skipped intentionally."
            exit 0
          fi
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
